<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLEO - Lost Cat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:#f5f7fa;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}
.cat-card{
    max-width:650px;
    width:100%;
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}
.hero{
    background:#dc3545;
    color:#fff;
    text-align:center;
    padding:25px 25px 100px;
}
.hero h1{
    font-weight:700;
    margin:0;
}
.cat-img{
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    margin: -90px auto 20px;
    border: 6px solid #ffffff;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    background: #f8f9fa;
}

@media (max-width: 576px){
    .cat-img{
        width: 140px;
        height: 140px;
        margin: -70px auto 15px;
    }
}
.cat-name{
    font-size:2rem;
    font-weight:700;
}
.info{
    font-size:1.05rem;
}
</style>
</head>
<body>

<div class="card cat-card">

    <div class="hero">
        <h1>🐱 I AM LOST</h1>
        <p class="mb-0">Please help me get home.</p>
    </div>

    <img src="/cat_helper/cleo.jpeg" alt="CLEO" class="cat-img">

    <div class="card-body p-4">

        <h2 class="cat-name text-center mb-3">CLEO</h2>

        <div class="alert alert-warning text-center">
            <strong>Indoor Cat</strong><br>
            I may be frightened outdoors.
        </div>

        <div class="info">
            <p><strong>Owner:</strong> Zaheer Saudagar</p>
            <p><strong>Medical Notes:</strong> Indoor Cat</p>
        </div>

        <div class="d-grid gap-2 mt-4">
            <a href="tel:7057907277" class="btn btn-success btn-lg">
                📞 Call Owner
            </a>

            <a href="https://wa.me/917057907277" class="btn btn-outline-success btn-lg">
                💬 WhatsApp Owner
            </a>

            <a href="tel:7058267364" class="btn btn-outline-secondary">
                Alternate Contact
            </a>
        </div>

        <p class="text-center text-muted mt-4 mb-0">
            Thank you for helping me find my way home ❤️
        </p>

    </div>
</div>

</body>
</html>
